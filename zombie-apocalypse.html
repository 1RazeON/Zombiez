<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧟 ZOMBIE APOCALYPSE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
        
        body {
            margin: 0;
            background: #0a0a0a;
            font-family: 'Press Start 2P', system-ui;
            overflow: hidden;
            color: #fff;
        }
        
        #game-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 8px solid #222;
            box-shadow: 0 0 40px #00ff8844;
        }
        
        /* START SCREEN */
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(#111, #0a0a0a);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .title {
            font-size: 52px;
            color: #ff3333;
            text-shadow: 0 0 20px #ff0000,
                        4px 4px 0 #000;
            margin-bottom: 10px;
            letter-spacing: 4px;
        }
        
        .subtitle {
            font-size: 18px;
            color: #00ff88;
            margin-bottom: 40px;
        }
        
        .start-form {
            background: #1a1a1a;
            padding: 30px;
            border: 4px solid #00ff88;
            width: 420px;
            text-align: center;
        }
        
        .start-form input {
            width: 90%;
            padding: 14px;
            margin: 12px 0;
            background: #222;
            border: 3px solid #444;
            color: white;
            font-family: 'Press Start 2P', system-ui;
            font-size: 16px;
        }
        
        .start-form button {
            background: #00ff88;
            color: #000;
            border: none;
            padding: 16px 40px;
            font-family: 'Press Start 2P', system-ui;
            font-size: 18px;
            font-weight: bold;
            margin: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .start-form button:hover {
            background: #00cc66;
            transform: scale(1.05);
        }
        
        .start-form button.secondary {
            background: #444;
            color: #fff;
        }
        
        .info {
            font-size: 13px;
            color: #888;
            margin-top: 20px;
        }
        
        /* GAME UI */
        #game-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            padding: 15px 20px;
            border: 3px solid #00ff88;
            font-size: 15px;
            line-height: 1.6;
            z-index: 100;
            pointer-events: none;
        }
        
        .health-bar {
            width: 220px;
            height: 22px;
            background: #330000;
            border: 3px solid #ff3333;
            margin: 8px 0;
            position: relative;
        }
        
        .health-fill {
            height: 100%;
            background: linear-gradient(#ff4444, #cc0000);
            transition: width 0.2s;
        }
        
        .inventory {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }
        
        .inv-item {
            background: #222;
            border: 2px solid #555;
            padding: 6px 12px;
            font-size: 14px;
        }
        
        .controls-hint {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 8px 20px;
            font-size: 13px;
            color: #aaa;
            border: 2px solid #444;
        }
        
        .building-menu {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20,20,20,0.95);
            padding: 10px;
            border: 3px solid #00ff88;
            display: flex;
            gap: 10px;
            z-index: 150;
        }
        
        .build-btn {
            background: #222;
            color: white;
            border: 3px solid #555;
            padding: 8px 16px;
            font-family: 'Press Start 2P', system-ui;
            font-size: 12px;
            cursor: pointer;
        }
        
        .build-btn:hover {
            border-color: #00ff88;
            background: #1a3a1a;
        }
    </style>
</head>
<body>
    <!-- START SCREEN -->
    <div id="start-screen">
        <div>
            <h1 class="title">ZOMBIE<br>APOCALYPSE</h1>
            <p class="subtitle">2D OPEN WORLD • MULTIPLAYER</p>
            
            <div class="start-form">
                <input type="text" id="player-name" placeholder="Dein Name" value="Survivor">
                
                <input type="text" id="server-url" placeholder="Server Adresse" value="http://localhost:3000">
                
                <br>
                <button onclick="startGame(true)">CREATE GAME</button>
                <button onclick="startGame(false)" class="secondary">JOIN GAME</button>
                
                <div class="info">
                    Für echten Multiplayer:<br>
                    1. Server starten (siehe unten)<br>
                    2. Freunde verbinden sich mit deiner IP
                </div>
            </div>
        </div>
    </div>

    <!-- GAME CONTAINER -->
    <div id="game-container"></div>

    <!-- GAME UI -->
    <div id="game-ui" style="display: none;">
        <div id="player-info">
            <div><span id="player-name-display"></span></div>
            <div class="health-bar">
                <div id="health-fill" class="health-fill" style="width: 100%;"></div>
            </div>
        </div>
        
        <div class="inventory">
            <div class="inv-item">🪵 <span id="wood">25</span></div>
            <div class="inv-item">🪨 <span id="stone">12</span></div>
            <div class="inv-item">🍖 <span id="food">8</span></div>
        </div>
        
        <div style="margin-top: 8px; font-size: 13px;">
            Zombies: <span id="zombie-count">0</span>
        </div>
    </div>

    <!-- BUILDING MENU -->
    <div id="building-menu" class="building-menu" style="display: none;">
        <button class="build-btn" onclick="selectBuildingType('wall')">WALL<br>5 Wood</button>
        <button class="build-btn" onclick="selectBuildingType('house')">HOUSE<br>15 Wood</button>
        <button class="build-btn" onclick="selectBuildingType('turret')">TURRET<br>10 Wood + 5 Stone</button>
    </div>

    <div class="controls-hint">
        WASD = Move &nbsp;&nbsp; Left Click = Shoot &nbsp;&nbsp; Right Click = Build &nbsp;&nbsp; 1-3 = Select Building
    </div>

    <!-- Phaser -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <!-- Socket.io -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <script>
        // ==================== GLOBALS ====================
        let game, player, cursors, wasd;
        let zombies = [];
        let buildings = [];
        let bullets = [];
        
        let wood = 25, stone = 12, food = 8;
        let health = 100;
        let playerName = "Survivor";
        let currentBuildingType = "wall";
        
        let socket = null;
        let otherPlayers = {};
        let isHost = false;

        let uiHealth, uiWood, uiStone, uiFood, uiZombieCount;
        let buildingMenu;
        let startScreen;

        // ==================== START SCREEN ====================
        function startGame(createNew) {
            startScreen = document.getElementById('start-screen');
            const nameInput = document.getElementById('player-name').value.trim() || "Survivor";
            const serverUrl = document.getElementById('server-url').value.trim() || "http://localhost:3000";
            
            playerName = nameInput;
            
            // Hide start screen
            startScreen.style.display = 'none';
            
            // Show game UI
            document.getElementById('game-ui').style.display = 'block';
            buildingMenu = document.getElementById('building-menu');
            buildingMenu.style.display = 'flex';
            
            // Initialize game
            initGame(serverUrl, createNew);
        }

        function initGame(serverUrl, isCreating) {
            isHost = isCreating;
            
            // Create Phaser game
            const config = {
                type: Phaser.AUTO,
                width: 1280,
                height: 720,
                parent: 'game-container',
                physics: {
                    default: 'arcade',
                    arcade: {
                        debug: false,
                        gravity: { y: 0 }
                    }
                },
                scene: {
                    preload: preload,
                    create: create,
                    update: update
                }
            };
            
            game = new Phaser.Game(config);
            
            // Connect to server
            connectToMultiplayer(serverUrl);
        }

        function connectToMultiplayer(serverUrl) {
            try {
                socket = io(serverUrl);
                
                socket.on('connect', () => {
                    console.log('%c[Multiplayer] Verbunden mit Server', 'color:#0f0');
                    
                    // Send player data
                    socket.emit('joinGame', {
                        name: playerName,
                        x: 640,
                        y: 360
                    });
                });
                
                socket.on('currentPlayers', (players) => {
                    Object.keys(players).forEach(id => {
                        if (id !== socket.id) {
                            addOtherPlayer(id, players[id]);
                        }
                    });
                });
                
                socket.on('newPlayer', (data) => {
                    addOtherPlayer(data.id, data);
                });
                
                socket.on('playerMoved', (data) => {
                    if (otherPlayers[data.id]) {
                        otherPlayers[data.id].setPosition(data.x, data.y);
                    }
                });
                
                socket.on('playerDisconnected', (id) => {
                    if (otherPlayers[id]) {
                        otherPlayers[id].destroy();
                        delete otherPlayers[id];
                    }
                });
                
                socket.on('buildEvent', (data) => {
                    createBuildingFromNetwork(data);
                });
                
            } catch (e) {
                console.warn("Socket.io konnte nicht verbunden werden. Lokales Spiel läuft.");
            }
        }

        function addOtherPlayer(id, data) {
            const other = game.scene.scenes[0].add.rectangle(data.x, data.y, 28, 28, 0x00ff00);
            other.setStrokeStyle(4, 0xffffff);
            other.nameText = game.scene.scenes[0].add.text(data.x, data.y - 30, data.name || "Player", {
                fontSize: '14px',
                fill: '#00ff88',
                fontFamily: 'monospace'
            }).setOrigin(0.5);
            
            otherPlayers[id] = other;
        }

        // ==================== GAME ====================
        function preload() {}

        function create() {
            const scene = this;
            
            // ==================== BIG WORLD ====================
            // Background
            scene.add.rectangle(640, 360, 1280, 720, 0x1a3c1a);
            
            // Grass tiles
            for (let x = 0; x < 40; x++) {
                for (let y = 0; y < 23; y++) {
                    const color = Math.random() > 0.75 ? 0x224422 : 0x1a3c1a;
                    const tile = scene.add.rectangle(16 + x * 32, 16 + y * 32, 32, 32, color);
                    tile.setStrokeStyle(1, 0x0f2a0f);
                }
            }
            
            // Roads
            scene.add.rectangle(640, 80, 1280, 50, 0x333333);
            scene.add.rectangle(200, 360, 50, 720, 0x333333);
            
            // ==================== INITIAL STRUCTURES ====================
            createBuilding(scene, 280, 220, 4, 3, 0x555555, "house");
            createBuilding(scene, 950, 480, 3, 3, 0x444444, "house");
            createBuilding(scene, 150, 550, 5, 2, 0x666666, "house");
            
            // ==================== PLAYER ====================
            player = scene.add.rectangle(640, 360, 30, 30, 0x00aaff);
            player.setStrokeStyle(5, 0xffffff);
            scene.physics.add.existing(player);
            player.body.setCollideWorldBounds(true);
            
            // Name above player
            player.nameText = scene.add.text(640, 330, playerName, {
                fontSize: '16px',
                fill: '#00aaff',
                fontFamily: 'monospace'
            }).setOrigin(0.5);
            
            // ==================== INPUT ====================
            cursors = scene.input.keyboard.createCursorKeys();
            wasd = scene.input.keyboard.addKeys('W,A,S,D,ONE,TWO,THREE,SPACE');
            
            // Shooting
            scene.input.on('pointerdown', (pointer) => {
                if (pointer.rightButtonDown()) {
                    // Right click = build
                    tryBuild(pointer.worldX, pointer.worldY);
                } else {
                    // Left click = shoot
                    shoot(pointer.worldX, pointer.worldY);
                }
            });
            
            // Keyboard building selection
            scene.input.keyboard.on('keydown-ONE', () => selectBuildingType('wall'));
            scene.input.keyboard.on('keydown-TWO', () => selectBuildingType('house'));
            scene.input.keyboard.on('keydown-THREE', () => selectBuildingType('turret'));
            
            // ==================== UI REFERENCES ====================
            uiHealth = document.getElementById('health-fill');
            uiWood = document.getElementById('wood');
            uiStone = document.getElementById('stone');
            uiFood = document.getElementById('food');
            uiZombieCount = document.getElementById('zombie-count');
            
            document.getElementById('player-name-display').innerText = playerName;
            
            updateUI();
            
            // Spawn initial zombies
            for (let i = 0; i < 8; i++) {
                spawnZombie(scene);
            }
            
            // Camera
            scene.cameras.main.startFollow(player, true, 0.12, 0.12);
            scene.cameras.main.setBounds(0, 0, 1280, 720);
            
            // Auto spawn zombies
            scene.time.addEvent({
                delay: 4200,
                callback: () => {
                    if (zombies.length < 22) spawnZombie(scene);
                },
                loop: true
            });
        }

        function selectBuildingType(type) {
            currentBuildingType = type;
            
            // Highlight active button
            document.querySelectorAll('.build-btn').forEach(btn => {
                btn.style.borderColor = '#555';
            });
            
            // Simple visual feedback
            console.log('%c[Build] Selected: ' + type, 'color:#0f0');
        }

        function createBuilding(scene, x, y, w, h, color, type) {
            const width = w * 32;
            const height = h * 32;
            
            let building = scene.add.rectangle(x, y, width, height, color);
            building.setStrokeStyle(4, 0x222222);
            
            if (type === "house") {
                const roof = scene.add.rectangle(x, y - 12, width - 8, 14, 0x333333);
            }
            
            if (type === "turret") {
                const gun = scene.add.rectangle(x, y, 10, 22, 0x222222);
            }
            
            scene.physics.add.existing(building);
            building.body.setImmovable(true);
            building.buildingType = type;
            
            buildings.push(building);
            return building;
        }

        function tryBuild(x, y) {
            const scene = game.scene.scenes[0];
            const gridX = Math.floor(x / 32) * 32 + 16;
            const gridY = Math.floor(y / 32) * 32 + 16;
            
            let costWood = 5;
            let costStone = 0;
            
            if (currentBuildingType === "house") { costWood = 15; }
            if (currentBuildingType === "turret") { costWood = 10; costStone = 5; }
            
            if (wood < costWood || stone < costStone) {
                alert("Nicht genug Ressourcen!");
                return;
            }
            
            // Check if space is free
            let blocked = false;
            buildings.forEach(b => {
                if (Phaser.Math.Distance.Between(b.x, b.y, gridX, gridY) < 45) blocked = true;
            });
            
            if (!blocked) {
                const newBuilding = createBuilding(scene, gridX, gridY, 
                    currentBuildingType === "wall" ? 1 : 2, 
                    currentBuildingType === "wall" ? 1 : 2, 
                    currentBuildingType === "wall" ? 0x8B4513 : 0x555555, 
                    currentBuildingType);
                
                wood -= costWood;
                stone -= costStone;
                updateUI();
                
                // Send to other players
                if (socket) {
                    socket.emit('buildEvent', {
                        x: gridX, y: gridY, 
                        type: currentBuildingType
                    });
                }
            }
        }

        function createBuildingFromNetwork(data) {
            const scene = game.scene.scenes[0];
            const color = data.type === "wall" ? 0x8B4513 : 0x555555;
            createBuilding(scene, data.x, data.y, 1, 1, color, data.type);
        }

        function shoot(targetX, targetY) {
            const scene = game.scene.scenes[0];
            
            const bullet = scene.add.rectangle(player.x, player.y, 8, 8, 0xffff00);
            scene.physics.add.existing(bullet);
            
            const angle = Phaser.Math.Angle.Between(player.x, player.y, targetX, targetY);
            bullet.body.setVelocity(Math.cos(angle) * 520, Math.sin(angle) * 520);
            
            bullets.push(bullet);
            
            // Bullet lifetime
            scene.time.delayedCall(900, () => {
                if (bullet.active) bullet.destroy();
            });
            
            // Check bullet vs zombies
            scene.physics.add.overlap(bullet, zombies, (bullet, zombie) => {
                if (zombie.health) zombie.health -= 35;
                bullet.destroy();
                
                if (zombie.health <= 0) {
                    zombie.destroy();
                    const idx = zombies.indexOf(zombie);
                    if (idx > -1) zombies.splice(idx, 1);
                    wood += 4;
                    stone += 1;
                    updateUI();
                }
            });
        }

        function spawnZombie(scene) {
            let x, y;
            let attempts = 0;
            
            do {
                x = Phaser.Math.Between(80, 1200);
                y = Phaser.Math.Between(80, 640);
                attempts++;
            } while (Phaser.Math.Distance.Between(x, y, player.x, player.y) < 220 && attempts < 20);
            
            const zombie = scene.add.rectangle(x, y, 28, 28, 0x00aa44);
            zombie.setStrokeStyle(3, 0x006622);
            scene.physics.add.existing(zombie);
            
            zombie.health = 45;
            zombie.speed = Phaser.Math.Between(85, 125);
            zombie.lastAttack = 0;
            
            zombies.push(zombie);
        }

        function updateUI() {
            if (!uiHealth) return;
            
            uiHealth.style.width = health + '%';
            uiWood.innerText = wood;
            uiStone.innerText = stone;
            uiFood.innerText = food;
            uiZombieCount.innerText = zombies.length;
            
            // Color health bar
            if (health < 30) uiHealth.style.background = '#ff0000';
            else if (health < 60) uiHealth.style.background = '#ffaa00';
            else uiHealth.style.background = 'linear-gradient(#ff4444, #cc0000)';
        }

        function update(time, delta) {
            const scene = this;
            const speed = 240;
            
            // Player movement
            let vx = 0, vy = 0;
            
            if (cursors.left.isDown || wasd.A.isDown) vx = -speed;
            if (cursors.right.isDown || wasd.D.isDown) vx = speed;
            if (cursors.up.isDown || wasd.W.isDown) vy = -speed;
            if (cursors.down.isDown || wasd.S.isDown) vy = speed;
            
            if (vx !== 0 && vy !== 0) {
                vx *= 0.707;
                vy *= 0.707;
            }
            
            player.body.setVelocity(vx, vy);
            player.nameText.setPosition(player.x, player.y - 32);
            
            // Send movement to server
            if (socket && (vx !== 0 || vy !== 0)) {
                socket.emit('playerMovement', {
                    x: player.x,
                    y: player.y
                });
            }
            
            // ==================== ZOMBIE AI ====================
            zombies.forEach((zombie, index) => {
                if (!zombie.active) return;
                
                const dist = Phaser.Math.Distance.Between(zombie.x, zombie.y, player.x, player.y);
                
                if (dist < 300) {
                    const angle = Phaser.Math.Angle.Between(zombie.x, zombie.y, player.x, player.y);
                    zombie.body.setVelocity(
                        Math.cos(angle) * zombie.speed,
                        Math.sin(angle) * zombie.speed
                    );
                } else {
                    if (Math.random() < 0.03) {
                        zombie.body.setVelocity(
                            Phaser.Math.Between(-70, 70),
                            Phaser.Math.Between(-70, 70)
                        );
                    }
                }
                
                // Attack player
                if (dist < 32 && time > zombie.lastAttack + 900) {
                    health = Math.max(0, health - 9);
                    zombie.lastAttack = time;
                    updateUI();
                    
                    if (health <= 0) {
                        alert("Du wurdest gefressen!\nSeite neu laden um neu zu starten.");
                        location.reload();
                    }
                }
                
                // Kill zombie if health reaches 0
                if (zombie.health <= 0) {
                    zombie.destroy();
                    zombies.splice(index, 1);
                    wood += 3;
                    updateUI();
                }
            });
            
            // ==================== BULLET COLLISIONS ====================
            bullets.forEach((bullet, i) => {
                if (!bullet.active) {
                    bullets.splice(i, 1);
                    return;
                }
                
                // Remove if out of bounds
                if (bullet.x < 0 || bullet.x > 1280 || bullet.y < 0 || bullet.y > 720) {
                    bullet.destroy();
                    bullets.splice(i, 1);
                }
            });
            
            // Update zombie count UI occasionally
            if (Math.random() < 0.05) {
                updateUI();
            }
            
            // Clamp player
            player.x = Phaser.Math.Clamp(player.x, 25, 1255);
            player.y = Phaser.Math.Clamp(player.y, 25, 695);
        }
        
        // ==================== HELPER ====================
        window.addEventListener('keydown', function(e) {
            if (e.key === "Escape") {
                const menu = document.getElementById('building-menu');
                if (menu) menu.style.display = menu.style.display === 'none' ? 'flex' : 'none';
            }
        });
        
        console.log('%c[Zombie Apocalypse] Spiel bereit. Viel Erfolg!', 'color:#0f0');
    </script>
</body>
</html>
